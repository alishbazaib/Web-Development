<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task 1</title>
  <style>

    body {
      font-family: Arial, sans-serif;
      padding: 10px;
    }

    header {
      background: #e9eef2;
      text-align: center;
      padding: 25px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    nav {
      background: #e9eef2;
      text-align: center;
      padding: 18px;
      border-radius: 6px;
      margin-bottom: 10px;
    }


    section {
      width: 100%;
      overflow: hidden;
    }

    aside {
      background: #e9eef2;
      width: 220px;
      min-height: 380px;
      float: left;
      border-radius: 6px;
      text-align: center;
      padding-top: 170px;
    }

    aside.right {
      float: right;
    }

    main {
      background: #e9eef2;
      min-height: 380px;
      border-radius: 6px;
      text-align: center;
      padding-top: 170px;
      margin: 0 230px;
    }


    footer {
      background: #e9eef2;
      text-align: center;
      padding: 22px;
      border-radius: 6px;
      margin-top: 10px;
      clear: both;
    }

  </style>
</head>
<body>

  <header>Header</header>

  <nav>Navigation Menu</nav>

  <section>
    <aside>Content</aside>
    <aside class="right">Content</aside>
    <main>Main Content</main>
  </section>

  <footer>Footer</footer>

</body>
</html>
